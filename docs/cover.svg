<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" width="1280" height="600" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="g1" cx="82%" cy="0%" r="62%">
      <stop offset="0%" stop-color="#c6f24a" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#c6f24a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="2%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#ff6a3d" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#ff6a3d" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <clipPath id="card"><rect x="1" y="1" width="1278" height="598" rx="22"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect width="1280" height="600" fill="#0c100d"/>
    <rect width="1280" height="600" fill="url(#g1)"/>
    <rect width="1280" height="600" fill="url(#g2)"/>
    <rect width="1280" height="600" filter="url(#grain)" opacity="0.05"/>

    <!-- top bar -->
    <g transform="translate(56,40)">
      <rect x="0" y="14" width="9" height="14" rx="4.5" fill="#c6f24a" opacity="0.55"/>
      <rect x="15" y="6" width="9" height="22" rx="4.5" fill="#c6f24a" opacity="0.8"/>
      <rect x="30" y="-6" width="9" height="34" rx="4.5" fill="#c6f24a"/>
      <circle cx="34.5" cy="-6" r="4.5" fill="#ff6a3d"/>
      <text x="52" y="22" font-size="26" font-weight="800" fill="#edf1e6">Rep<tspan fill="#c6f24a">Train</tspan></text>
    </g>

    <!-- header tags (sharp), mirrors the live app -->
    <g transform="translate(798,38)" font-family="Consolas, 'SF Mono', monospace">
      <rect x="0" y="0" width="200" height="36" fill="#1c2318" stroke="#36412a"/>
      <rect x="0" y="0" width="3" height="36" fill="#c6f24a"/>
      <rect x="14" y="14" width="8" height="8" fill="#c6f24a"/>
      <text x="30" y="23" font-size="13" fill="#98a18d">19.97 USDC</text>
      <text x="112" y="23" font-size="13" fill="#edf1e6">0x9db…4744</text>
      <rect x="210" y="0" width="126" height="36" fill="#1c2318" stroke="#36412a"/>
      <rect x="224" y="14" width="8" height="8" fill="#c6f24a"/>
      <text x="240" y="23" font-size="11" letter-spacing="1.5" fill="#98a18d">ARC·TESTNET</text>
      <rect x="346" y="0" width="44" height="36" fill="#1c2318" stroke="#36412a"/>
      <path d="M368 10 v8 M363 13 a7 7 0 1 0 10 0" fill="none" stroke="#98a18d" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- hero copy -->
    <g transform="translate(56,150)">
      <g transform="rotate(-2.2)">
        <rect x="0" y="0" width="336" height="30" fill="#c6f24a"/>
        <text x="15" y="20" font-size="13" font-weight="800" letter-spacing="1.6" fill="#0c100d">ON-CHAIN TRAINING PACT · ARC</text>
      </g>
      <text x="-2" y="118" font-size="82" font-weight="900" letter-spacing="-3" fill="#edf1e6" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif">DON'T BREAK</text>
      <text x="-2" y="200" font-size="82" font-weight="900" letter-spacing="-3" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"><tspan fill="#edf1e6">THE </tspan><tspan fill="none" stroke="#c6f24a" stroke-width="2.2">CHAIN.</tspan></text>
      <text x="0" y="256" font-size="18" fill="#98a18d">Put real money on your training. Show up daily — or fund the people who do.</text>
      <g transform="translate(0,288)">
        <rect x="5" y="5" width="236" height="54" fill="#0c100d"/>
        <rect x="0" y="0" width="236" height="54" fill="#c6f24a"/>
        <text x="118" y="35" font-size="18" font-weight="900" fill="#0c100d" text-anchor="middle" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif">START A PACT →</text>
      </g>
    </g>

    <!-- streak ring -->
    <g transform="translate(992,258)">
      <circle r="116" fill="none" stroke="#1c2318" stroke-width="16"/>
      <circle r="116" fill="none" stroke="#c6f24a" stroke-width="16" stroke-linecap="round" stroke-dasharray="728.8" stroke-dashoffset="131" transform="rotate(-90)"/>
      <text y="8" font-size="66" font-weight="900" text-anchor="middle" fill="#edf1e6" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif">12</text>
      <text y="40" font-size="13" letter-spacing="3" text-anchor="middle" fill="#98a18d">OF 12 DONE</text>
      <text y="150" font-size="14" font-weight="700" letter-spacing="1" text-anchor="middle" fill="#ff9a4a">28-DAY STREAK</text>
    </g>

    <!-- mini training log -->
    <g transform="translate(905,430)">
      <!-- pattern of lit (volt) / dim days -->
      <g fill="#1c2318">
        <rect x="0" y="0" width="14" height="14" rx="3"/><rect x="18" y="0" width="14" height="14" rx="3"/>
        <rect x="180" y="0" width="14" height="14" rx="3"/>
      </g>
      <g fill="#c6f24a">
        <rect x="36" y="0" width="14" height="14" rx="3"/><rect x="54" y="0" width="14" height="14" rx="3"/>
        <rect x="72" y="0" width="14" height="14" rx="3"/><rect x="90" y="0" width="14" height="14" rx="3"/>
        <rect x="108" y="0" width="14" height="14" rx="3"/><rect x="126" y="0" width="14" height="14" rx="3"/>
        <rect x="144" y="0" width="14" height="14" rx="3"/><rect x="162" y="0" width="14" height="14" rx="3"/>
        <rect x="198" y="0" width="14" height="14" rx="3"/><rect x="216" y="0" width="14" height="14" rx="3"/>
        <rect x="234" y="0" width="14" height="14" rx="3"/><rect x="252" y="0" width="14" height="14" rx="3"/>
      </g>
    </g>

    <!-- ribbon -->
    <rect x="0" y="544" width="1280" height="44" fill="#c6f24a"/>
    <text x="40" y="572" font-size="15" font-weight="900" letter-spacing="0.4" fill="#0c100d" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif">SHOW UP <tspan fill="#ff6a3d">/</tspan> STAKE IT <tspan fill="#ff6a3d">/</tspan> LOG IT DAILY <tspan fill="#ff6a3d">/</tspan> DON'T MISS <tspan fill="#ff6a3d">/</tspan> KEEP THE CHAIN <tspan fill="#ff6a3d">/</tspan> NO EXCUSES</text>
  </g>

  <rect x="1" y="1" width="1278" height="598" rx="22" fill="none" stroke="#28311f"/>
</svg>
